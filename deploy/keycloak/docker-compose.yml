# Local Keycloak for the SPT-Txn identity-provider proof.
#   docker compose up -d        # start
#   docker compose logs -f      # watch until "started"
#   docker compose down         # stop
#
# Imports the `spt` realm (one public client `spt-agent`, one user alice/alice).
# Dev mode, HTTP only, for the demo — NOT a production configuration.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Keycloak <26 uses KEYCLOAK_ADMIN / KEYCLOAK_ADMIN_PASSWORD instead.
    ports:
      - "8080:8080"
    volumes:
      - ./realm.json:/opt/keycloak/data/import/realm.json:ro
