#
# /etc/relayd.conf — foss.violetskysecurity.com TLS frontends.
#
# Two public TLS terminators share the Let's Encrypt keypair:
#   :443  → static website (httpd backend on 127.0.0.1:8080)
#   :4445 → SPT-Txn Travel Rule API (trruleb beneficiary on 127.0.0.1:8085),
#           deny-by-default: only the three Travel Rule paths are forwarded.
#
# Intentionally NOT exposed at the edge (socket-only / loopback): the trust
# registry (/tr/register) and CAT issuer (/cat/issue). Do not re-add :4443/:4444
# relays for them — that reopens the C1/C3 findings. See docs/SECURITY-REVIEW.md.
#

table <httpd_backend>  { 127.0.0.1 }
table <trrule_backend> { 127.0.0.1 }
table <agent_backend>  { 127.0.0.1 }

# ── Public website (TLS on :443 → httpd backend on :8080) ───────────────────
http protocol "spt_https" {
	tls keypair foss.violetskysecurity.com
	match request header set "X-Forwarded-For" value "$REMOTE_ADDR"
	match request header set "X-Forwarded-Proto" value "https"
	match request header set "X-Forwarded-Port" value "443"
	pass forward to <httpd_backend>
}

relay "wwwtls" {
	listen on 0.0.0.0 port 443 tls
	protocol "spt_https"
	forward to <httpd_backend> port 8080
}

# ── Travel Rule API (TLS on :4445 → trruleb beneficiary on :8085) ───────────
http protocol "trrule_https" {
	tls keypair foss.violetskysecurity.com
	match request header set "X-Forwarded-For" value "$REMOTE_ADDR"
	match request header set "X-Forwarded-Proto" value "https"
	match request header set "X-Forwarded-Port" value "4445"
	# CORS: let the public site's browser read /travel/health for the live status badge.
	match response header set "Access-Control-Allow-Origin" value "https://foss.violetskysecurity.com"
	block
	pass request path "/travel/verify" forward to <trrule_backend>
	pass request path "/travel/health" forward to <trrule_backend>
	pass request path "/trp/transfer"  forward to <trrule_backend>
}

relay "trrule_tls" {
	listen on 0.0.0.0 port 4445 tls
	protocol "trrule_https"
	forward to <trrule_backend> port 8085
}

# ── Agentic verify API (TLS on :4446 → agentsvc verify on :8087) ────────────
# Verify-only backend: holds no signing key. Deny-by-default — only the two
# agent endpoints are forwarded. Hosted verification is a convenience; the
# offline verifier library remains the primary path (see
# docs/AGENTSVC-AND-ZKCHAIN-SCOPING.md).
http protocol "agent_https" {
	tls keypair foss.violetskysecurity.com
	match request header set "X-Forwarded-For" value "$REMOTE_ADDR"
	match request header set "X-Forwarded-Proto" value "https"
	match request header set "X-Forwarded-Port" value "4446"
	# CORS: let the public site's browser read /agent/health for the live status badge.
	match response header set "Access-Control-Allow-Origin" value "https://foss.violetskysecurity.com"
	block
	pass request path "/agent/verify" forward to <agent_backend>
	pass request path "/agent/health" forward to <agent_backend>
}

relay "agent_tls" {
	listen on 0.0.0.0 port 4446 tls
	protocol "agent_https"
	forward to <agent_backend> port 8087
}
